services:
  redis:
    image: redis:7-alpine
    container_name: manicure-redis-${TENANT_SLUG:-default}
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "manicure-${TENANT_SLUG:-default}-redis"

  bot:
    build: .
    container_name: manicure-bot-${TENANT_SLUG:-default}
    env_file: .env
    # Лейбл для autoheal: sidecar рестартит только помеченные контейнеры.
    labels:
      - autoheal=true
    # Жёсткие override для контейнерной среды: сервис-имена и volume-пути
    # не должны зависеть от того, что осталось в .env у разработчика.
    environment:
      DB_PATH: /app/data/manicure.db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    # Healthcheck: считаем бот живым, если heartbeat-файл обновлялся в последние
    # 30 мин. Scheduler трогает /app/data/.heartbeat каждые 5 мин — если event
    # loop висит или polling завис, mtime протухнет → `docker ps` покажет unhealthy.
    # Почему не mtime manicure.db: в WAL-режиме SELECT не трогает main-файл,
    # а INSERT бывает только когда реально шлём напоминалку. В пустой день
    # mtime БД стоял бы часами → ложные unhealthy.
    # ВНИМАНИЕ: Docker compose сам по себе НЕ рестартит unhealthy-контейнеры
    # (только при падении процесса). Для авто-восстановления добавь sidecar
    # willfarrell/autoheal или внешний мониторинг. Сейчас — ранняя диагностика
    # через /status и `docker ps`. start_period=120s даёт init_db + первый tick scheduler'а.
    healthcheck:
      test: ["CMD-SHELL", "find /app/data/.heartbeat -mmin -30 2>/dev/null | grep -q ."]
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "manicure-${TENANT_SLUG:-default}-bot"

  # Рестартит контейнеры с label autoheal=true при healthcheck=unhealthy.
  # Docker compose сам по себе не реагирует на unhealthy — только на crash.
  # Event loop бота может зависнуть без падения процесса → без autoheal салон
  # окажется unhealthy в 20:00, а никто не перезапустит до утра.
  # ~20MB RAM, read-only docker socket.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: manicure-autoheal-${TENANT_SLUG:-default}
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "60"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        tag: "manicure-${TENANT_SLUG:-default}-autoheal"

volumes:
  redis-data:
    name: manicure-redis-${TENANT_SLUG:-default}
